apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: project-task-mcp
  labels:
    app: notification-api
    app.kubernetes.io/part-of: task-management-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: ghcr.io/mehroz17/task-management-agent/notification-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: TASK_MCP_URL
              value: "http://task-mcp-server.project-task-mcp.svc.cluster.local:8000/mcp"
            - name: WATCHED_PROJECTS
              value: "task-agent"
            - name: DEFAULT_THRESHOLD_HOURS
              value: "24"
            - name: MAX_NOTIFICATIONS
              value: "200"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
