apiVersion: v1
kind: ConfigMap
metadata:
  name: task-mcp-config
  namespace: task-mcp
  labels:
    app.kubernetes.io/name: task-mcp
    app.kubernetes.io/part-of: task-management-agent
data:
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8000"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-mcp-sa
  namespace: task-mcp
  labels:
    app.kubernetes.io/name: task-mcp
    app.kubernetes.io/part-of: task-management-agent
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-mcp
  namespace: task-mcp
  labels:
    app.kubernetes.io/name: task-mcp
    app.kubernetes.io/version: "0.1.1"
    app.kubernetes.io/part-of: task-management-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: task-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-mcp
        app.kubernetes.io/version: "0.1.1"
        app.kubernetes.io/part-of: task-management-agent
    spec:
      serviceAccountName: task-mcp-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: task-mcp
          image: ghcr.io/mehroz17/task-management-agent/task-mcp-server:sha-9e143707c001d6d789fe4d643652debd8ad4f239
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: task-mcp-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: task-mcp
  namespace: task-mcp
  labels:
    app.kubernetes.io/name: task-mcp
    app.kubernetes.io/part-of: task-management-agent
spec:
  selector:
    app.kubernetes.io/name: task-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP
